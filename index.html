<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentPilot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07070f;color:#fff;font-family:Arial,sans-serif;}
.header{background:#0f0f1a;padding:16px 20px;border-bottom:1px solid #222;}
.logo{font-size:20px;font-weight:700;color:#8b7fff;}
.tabs{display:flex;border-bottom:1px solid #222;background:#0f0f1a;position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:14px;text-align:center;font-size:13px;font-weight:600;color:#555;cursor:pointer;border-bottom:3px solid transparent;}
.tab.on{color:#8b7fff;border-bottom-color:#8b7fff;}
.container{padding:16px;max-width:700px;margin:0 auto;padding-bottom:40px;}
.btn{display:block;width:100%;padding:16px;background:#8b7fff;border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;text-align:center;}
.card{background:#0f0f1a;border:1px solid #222;border-radius:12px;padding:16px;margin-bottom:12px;}
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ch{background:#161625;border:2px solid #222;border-radius:12px;padding:14px;cursor:pointer;text-align:center;}
.ch.on{border-color:#8b7fff;background:#1a1430;}
.ch-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin:0 auto 6px;}
.ch-n{font-size:12px;font-weight:600;}
.pbar{background:#161625;border:1px solid #222;border-radius:12px;padding:16px;margin-bottom:16px;display:none;}
.pbar.show{display:block;}
.pstep{padding:8px 0;font-size:13px;color:#444;display:flex;gap:10px;align-items:center;border-bottom:1px solid #222;}
.pstep:last-child{border:none;}
.pstep.go{color:#8b7fff;}
.pstep.ok{color:#4ecf8a;}
.pstep.no{color:#f06060;}
.dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;}
.pstep.go .dot{background:#8b7fff;}
.pstep.ok .dot{background:#4ecf8a;}
.pstep.no .dot{background:#f06060;}
.sc{background:#161625;border:1px solid #222;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sc-h{padding:14px 16px;}
.sc-ch{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.sc-t{font-size:15px;font-weight:700;margin-bottom:6px;}
.sc-p{padding:0 16px 12px;font-size:13px;color:#666;line-height:1.6;}
.sc-a{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #222;}
.sc-r{padding:13px;border:none;background:transparent;color:#f06060;font-size:13px;font-weight:700;cursor:pointer;border-right:1px solid #222;}
.sc-ap{padding:13px;border:none;background:transparent;color:#4ecf8a;font-size:13px;font-weight:700;cursor:pointer;}
.sc-bar{padding:10px 16px;border-top:1px solid #222;font-size:12px;}
.empty{text-align:center;padding:60px 20px;color:#444;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#222;border-radius:10px;padding:12px 20px;font-size:13px;z-index:99;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:50;align-items:flex-end;}
.overlay.show{display:flex;}
.sheet{background:#0f0f1a;border-radius:20px 20px 0 0;padding:24px;width:100%;}
.sheet-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.sheet-ch{font-size:11px;color:#888;margin-bottom:12px;}
.sheet-script{max-height:220px;overflow-y:auto;background:#161625;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;line-height:1.7;color:#bbb;white-space:pre-wrap;}
.sc-full{max-height:300px;overflow-y:auto;background:#0f0f1a;border-radius:8px;padding:10px 12px;margin:0 16px 12px;font-size:13px;line-height:1.7;color:#999;white-space:pre-wrap;display:none;}
.sc-toggle{padding:0 16px 10px;font-size:12px;color:#8b7fff;cursor:pointer;}
.sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sheet-r{padding:14px;background:rgba(240,96,96,0.1);border:1px solid rgba(240,96,96,0.3);border-radius:12px;color:#f06060;font-size:14px;font-weight:700;cursor:pointer;}
.sheet-ap{padding:14px;background:#4ecf8a;border:none;border-radius:12px;color:#000;font-size:14px;font-weight:700;cursor:pointer;}
.loading-txt{font-size:13px;color:#8b7fff;text-align:center;padding:16px;}
#errbox{display:none;background:#3a0f0f;border:2px solid #f06060;color:#ffb0b0;padding:14px;margin:10px 16px;border-radius:10px;font-size:12px;white-space:pre-wrap;word-break:break-word;}
#statusline{font-size:11px;color:#4ecf8a;padding:4px 16px;}
</style>
</head>
<body>

<div id="errbox"></div>
<div id="statusline">Loading...</div>

<script>
window.onerror = function(msg, url, line, col, err){
  var box = document.getElementById('errbox');
  box.style.display = 'block';
  box.textContent = 'ERROR: ' + msg + ' (line ' + line + ', col ' + col + ')';
  document.getElementById('statusline').textContent = 'JS FAILED - see error above';
  document.getElementById('statusline').style.color = '#f06060';
  return false;
};
document.getElementById('statusline').textContent = 'Page loaded OK';
</script>

<div class="header"><div class="logo">ContentPilot</div></div>
<div class="tabs">
  <div class="tab on" id="t-gen" onclick="tab('gen')">Generate</div>
  <div class="tab" id="t-rev" onclick="tab('rev')">Review</div>
  <div class="tab" id="t-sch" onclick="tab('sch')">Schedule</div>
</div>

<div class="container">
  <div id="pg-gen">
    <div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Daily Scripts</div>
      <div style="font-size:13px;color:#888;margin-bottom:16px;">Select channels and tap Generate.</div>
      <button class="btn" id="genbtn" onclick="doGenerate()">Generate Scripts</button>
    </div>
    <div class="pbar" id="pbar">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;" id="ptitle">Generating...</div>
      <div class="pstep" id="ps1"><div class="dot"></div>Dark Psychology</div>
      <div class="pstep" id="ps2"><div class="dot"></div>Space and Universe</div>
      <div class="pstep" id="ps3"><div class="dot"></div>Dark History</div>
      <div class="pstep" id="ps4"><div class="dot"></div>True Crime</div>
    </div>
    <div style="font-size:11px;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Channels</div>
    <div class="ch-grid">
      <div class="ch on" id="ch1" onclick="toggleCh(this)"><div class="ch-badge" style="background:#8b7fff22;color:#8b7fff">P</div><div class="ch-n" style="color:#8b7fff">Dark Psychology</div></div>
      <div class="ch on" id="ch2" onclick="toggleCh(this)"><div class="ch-badge" style="background:#38c4f022;color:#38c4f0">S</div><div class="ch-n" style="color:#38c4f0">Space Universe</div></div>
      <div class="ch on" id="ch3" onclick="toggleCh(this)"><div class="ch-badge" style="background:#d4a96a22;color:#d4a96a">H</div><div class="ch-n" style="color:#d4a96a">Dark History</div></div>
      <div class="ch on" id="ch4" onclick="toggleCh(this)"><div class="ch-badge" style="background:#f0606022;color:#f06060">C</div><div class="ch-n" style="color:#f06060">True Crime</div></div>
    </div>
  </div>

  <div id="pg-rev" style="display:none"><div id="revlist"></div></div>
  <div id="pg-sch" style="display:none"><div id="schlist"></div></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-title" id="sheet-title">Loading...</div>
    <div class="sheet-ch" id="sheet-ch"></div>
    <div class="sheet-script" id="sheet-script"></div>
    <div id="sheet-loading" class="loading-txt">Generating voice... please wait...</div>
    <audio id="ap" controls style="display:none;width:100%;margin-bottom:16px;"></audio>
    <div class="sheet-btns">
      <button class="sheet-r" onclick="doReject()">Reject</button>
      <button class="sheet-ap" onclick="doApprove()">Approve</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
try {

var PROXY='https://contentpilot-proxy.shilpaunnitravnook.workers.dev/';
var EK='sk_ca8480a4b093fcf60df5d0ae64e5d3dbfad638a64231a1b9';
var VID='rkrNegGbFkudOQijQRs0';
var Q=JSON.parse(localStorage.getItem('cpq6')||'[]');
var currentId=null;

var CHANNELS=[
  {id:'dark_psychology',name:'Dark Psychology',badge:'P',color:'#8b7fff',psId:'ps1',topics:['manipulation tactics people use without realizing','cognitive biases that control decisions','dark personality traits explained by science','why people stay in toxic relationships','psychological experiments with disturbing results','how propaganda works on the brain','psychology behind cult indoctrination','body language secrets psychologists know']},
  {id:'space_universe',name:'Space Universe',badge:'S',color:'#38c4f0',psId:'ps2',topics:['what exists beyond the observable universe','black holes NASA cannot explain','planets more terrifying than fiction','the Fermi paradox and alien life','mysterious deep space signals explained','multiverse theory and evidence','most extreme objects in the universe','what happens inside a black hole']},
  {id:'dark_history',name:'Dark History',badge:'H',color:'#d4a96a',psId:'ps3',topics:['experiments governments tried to hide','atrocities never in history books','how ancient civilizations collapsed','brutal medieval practices','wars that started for absurd reasons','secret societies that shaped history','dark truth behind famous events','historical figures erased from records']},
  {id:'true_crime',name:'True Crime',badge:'C',color:'#f06060',psId:'ps4',topics:['cold cases solved decades later','psychology of serial killers','unsolved disappearances that baffled police','forensic breakthroughs that cracked cases','cases where wrong person was convicted','most baffling unsolved mysteries','criminal masterminds and how caught','perfect heists police still cannot explain']}
];

function tab(name){
  var pages=['gen','rev','sch'];
  for(var i=0;i<pages.length;i++){
    document.getElementById('pg-'+pages[i]).style.display='none';
    document.getElementById('t-'+pages[i]).classList.remove('on');
  }
  document.getElementById('pg-'+name).style.display='block';
  document.getElementById('t-'+name).classList.add('on');
  if(name==='rev') drawReview();
  if(name==='sch') drawSchedule();
}

function toggleCh(el){
  el.classList.toggle('on');
}

function ps(id,state){
  var el=document.getElementById(id);
  el.classList.remove('go','ok','no');
  if(state) el.classList.add(state);
}

function pickTopic(chId,ch){
  var used=[];
  for(var i=0;i<Q.length;i++){ if(Q[i].channel===chId) used.push(Q[i].topic); }
  used=used.slice(-5);
  var pool=[];
  for(var j=0;j<ch.topics.length;j++){
    if(used.indexOf(ch.topics[j])===-1) pool.push(ch.topics[j]);
  }
  var list=pool.length?pool:ch.topics;
  return list[Math.floor(Math.random()*list.length)];
}

function callProxy(body, callback){
  fetch(PROXY,{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},
    body:JSON.stringify(body)
  }).then(function(res){ return res.json(); })
    .then(function(data){ callback(null, data); })
    .catch(function(err){ callback(err, null); });
}

function doGenerate(){
  var selected=[];
  for(var i=0;i<CHANNELS.length;i++){
    var el=document.getElementById('ch'+(i+1));
    if(el.classList.contains('on')) selected.push(CHANNELS[i]);
  }
  if(!selected.length){ showToast('Select at least one channel'); return; }

  document.getElementById('pbar').classList.add('show');
  var btn=document.getElementById('genbtn');
  btn.disabled=true;
  btn.textContent='Generating...';

  runNext(selected, 0, 0);
}

function runNext(selected, index, doneCount){
  if(index >= selected.length){
    var btn=document.getElementById('genbtn');
    btn.disabled=false;
    btn.textContent='Generate Scripts';
    document.getElementById('ptitle').textContent = doneCount>0 ? (doneCount+' scripts ready!') : 'Failed - check connection';
    if(doneCount>0) showToast(doneCount+' scripts ready for review!');
    return;
  }

  var ch=selected[index];
  ps(ch.psId,'go');
  var topic=pickTopic(ch.id, ch);

  var body={
    model:'claude-sonnet-4-6',
    max_tokens:1500,
    system:'You are a YouTube scriptwriter for "'+ch.name+'". Write engaging factual scripts. Structure: hook, context, 5-7 verified facts with real sources, twist, close, CTA. 750-900 words. After script write: TITLE: under 60 chars then SCORE: 0-100',
    messages:[{role:'user',content:'Write a YouTube script for "'+ch.name+'" on: "'+topic+'"'}]
  };

  callProxy(body, function(err, data){
    if(err || !data || !data.content || !data.content[0]){
      ps(ch.psId,'no');
      if(data && data.error) showToast('Error: '+data.error.message);
      runNext(selected, index+1, doneCount);
      return;
    }

    var text=data.content[0].text;
    var lines=text.split('\n');
    var title=topic, score=80, sl=[];
    for(var k=0;k<lines.length;k++){
      var l=lines[k];
      if(l.indexOf('TITLE:')===0) title=l.replace('TITLE:','').trim();
      else if(l.indexOf('SCORE:')===0){ try{ score=parseInt(l.replace('SCORE:','').trim()); }catch(e){} }
      else sl.push(l);
    }
    var script=sl.join('\n').trim();

    Q.push({
      id: ch.id+'_'+Date.now(),
      channel: ch.id,
      name: ch.name,
      badge: ch.badge,
      color: ch.color,
      topic: topic,
      title: title,
      script: script,
      preview: script.split(' ').slice(0,40).join(' ')+'...',
      score: score,
      status: 'pending',
      created: new Date().toISOString(),
      scheduled: null
    });
    save();
    ps(ch.psId,'ok');
    runNext(selected, index+1, doneCount+1);
  });
}

function drawReview(){
  var list=document.getElementById('revlist');
  var items=Q.slice().reverse();
  if(!items.length){
    list.innerHTML='<div class="empty"><div style="font-size:48px;margin-bottom:12px">--</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">No scripts yet</div><div style="font-size:13px">Go to Generate tab</div></div>';
    return;
  }
  var html='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var sc=item.score>=80?'#4ecf8a':item.score>=60?'#ffb84d':'#f06060';
    var actions='';
    if(item.status==='pending'){
      actions='<div class="sc-a"><button class="sc-r" onclick="reject(\''+item.id+'\')">Reject</button><button class="sc-ap" onclick="preview(\''+item.id+'\')">Listen and Approve</button></div>';
    } else if(item.status==='approved'){
      var dt = item.scheduled ? new Date(item.scheduled).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      actions='<div class="sc-bar" style="color:#4ecf8a">Scheduled: '+dt+'</div>';
    } else {
      actions='<div class="sc-bar" style="color:#f06060">Rejected</div>';
    }
    html += '<div class="sc"><div class="sc-h"><div class="sc-ch" style="color:'+item.color+'">'+item.badge+' - '+item.name+'</div><div class="sc-t">'+item.title+'</div><span style="font-size:11px;background:'+sc+'22;color:'+sc+';padding:3px 8px;border-radius:6px">Fact: '+item.score+'%</span></div><div class="sc-p">'+item.preview+'</div><div class="sc-full" id="full-'+item.id+'"></div><div class="sc-toggle" id="toggle-'+item.id+'" onclick="toggleFull(\''+item.id+'\')">Read full script</div>'+actions+'</div>';
  }
  list.innerHTML=html;
  for(var x=0;x<items.length;x++){
    var fdiv=document.getElementById('full-'+items[x].id);
    if(fdiv) fdiv.textContent=items[x].script;
  }
}

function toggleFull(id){
  var full=document.getElementById('full-'+id);
  var toggle=document.getElementById('toggle-'+id);
  if(full.style.display==='block'){
    full.style.display='none';
    toggle.textContent='Read full script';
  } else {
    full.style.display='block';
    toggle.textContent='Hide script';
  }
}

function preview(id){
  currentId=id;
  var item=null;
  for(var i=0;i<Q.length;i++){ if(Q[i].id===id) item=Q[i]; }
  if(!item) return;

  document.getElementById('sheet-title').textContent=item.title;
  document.getElementById('sheet-ch').textContent=item.badge+' - '+item.name;
  document.getElementById('sheet-script').textContent=item.script;
  document.getElementById('sheet-loading').style.display='block';
  document.getElementById('sheet-loading').textContent='Generating voice... please wait...';
  document.getElementById('ap').style.display='none';
  document.getElementById('overlay').classList.add('show');

  fetch('https://api.elevenlabs.io/v1/text-to-speech/'+VID,{
    method:'POST',
    headers:{'Content-Type':'application/json','xi-api-key':EK},
    body:JSON.stringify({
      text: item.script.substring(0,4800),
      model_id:'eleven_multilingual_v2',
      voice_settings:{stability:0.50,similarity_boost:1.00,style:0.00,use_speaker_boost:true}
    })
  }).then(function(res){
    if(res.ok){
      return res.blob().then(function(blob){
        var url=URL.createObjectURL(blob);
        var audio=document.getElementById('ap');
        audio.src=url;
        audio.style.display='block';
        document.getElementById('sheet-loading').style.display='none';
        audio.play();
        showToast('Rudra is speaking. Listen then approve.');
      });
    } else {
      document.getElementById('sheet-loading').textContent='Voice failed. Review script and approve if happy.';
    }
  }).catch(function(e){
    document.getElementById('sheet-loading').textContent='Voice unavailable. Review script above.';
  });
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  var a=document.getElementById('ap');
  a.pause();
  a.src='';
  currentId=null;
}

function doApprove(){
  if(!currentId) return;
  var item=null;
  for(var i=0;i<Q.length;i++){ if(Q[i].id===currentId) item=Q[i]; }
  if(!item) return;
  item.status='approved';
  var times={dark_psychology:{h:19,m:0},space_universe:{h:20,m:0},dark_history:{h:19,m:30},true_crime:{h:20,m:30}};
  var t=times[item.channel]||{h:19,m:0};
  var d=new Date();
  d.setHours(t.h,t.m,0,0);
  if(d<=new Date()) d.setDate(d.getDate()+1);
  item.scheduled=d.toISOString();
  save();
  closeOverlay();
  drawReview();
  showToast('Approved and scheduled!');
}

function doReject(){
  if(!currentId) return;
  reject(currentId);
  closeOverlay();
}

function reject(id){
  var item=null;
  for(var i=0;i<Q.length;i++){ if(Q[i].id===id) item=Q[i]; }
  if(!item) return;
  item.status='rejected';
  save();
  drawReview();
  showToast('Rejected');
}

function drawSchedule(){
  var approved=[], pending=[];
  for(var i=0;i<Q.length;i++){
    if(Q[i].status==='approved') approved.push(Q[i]);
    if(Q[i].status==='pending') pending.push(Q[i]);
  }
  approved.sort(function(a,b){ return new Date(a.scheduled)-new Date(b.scheduled); });

  var html='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">';
  html+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#8b7fff">'+Q.length+'</div><div style="font-size:10px;color:#555">Total</div></div>';
  html+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#4ecf8a">'+approved.length+'</div><div style="font-size:10px;color:#555">Approved</div></div>';
  html+='<div class="card" style="text-align:center"><div style="font-size:28px;font-weight:700;color:#ffb84d">'+pending.length+'</div><div style="font-size:10px;color:#555">Pending</div></div>';
  html+='</div>';

  if(approved.length){
    html+='<div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Scheduled</div>';
    for(var a=0;a<approved.length;a++){
      var it=approved[a];
      var dt=new Date(it.scheduled).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      html+='<div style="background:#161625;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;"><div style="width:32px;height:32px;border-radius:50%;background:'+it.color+'22;color:'+it.color+';display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">'+it.badge+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+it.title+'</div><div style="font-size:11px;color:#555">'+dt+'</div></div><div style="color:#4ecf8a;font-size:11px;font-weight:700">OK</div></div>';
    }
  }
  if(pending.length){
    html+='<div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:16px;">Pending</div>';
    for(var p=0;p<pending.length;p++){
      var it2=pending[p];
      html+='<div style="background:#161625;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:center;"><div style="width:32px;height:32px;border-radius:50%;background:'+it2.color+'22;color:'+it2.color+';display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;">'+it2.badge+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+it2.title+'</div><div style="font-size:11px;color:#555">'+it2.name+'</div></div><div onclick="tab(\'rev\')" style="color:#ffb84d;font-size:11px;font-weight:700;cursor:pointer">Review</div></div>';
    }
  }
  if(!approved.length && !pending.length){
    html+='<div class="empty"><div style="font-size:48px;margin-bottom:12px">--</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Nothing yet</div><div style="font-size:13px">Generate and approve scripts first</div></div>';
  }
  document.getElementById('schlist').innerHTML=html;
}

function save(){ localStorage.setItem('cpq6', JSON.stringify(Q)); }

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 4000);
}

document.getElementById('statusline').textContent = 'App ready - tap Generate Scripts';

} catch(e) {
  var box = document.getElementById('errbox');
  box.style.display = 'block';
  box.textContent = 'SCRIPT ERROR: ' + e.message;
  document.getElementById('statusline').textContent = 'App failed to start - see error above';
  document.getElementById('statusline').style.color = '#f06060';
}
