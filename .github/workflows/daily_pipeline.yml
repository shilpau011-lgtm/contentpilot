name: ContentPilot — Daily Pipeline

on:
  schedule:
    - cron: '0 2 * * 1-5'  # 6am Dubai time, Mon-Fri
  workflow_dispatch:

jobs:
  generate-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Agent 1 — Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f "agents/agent1_writer.py" ]; then
            python agents/agent1_writer.py
          else
            python agent1_writer.py
          fi

      - name: Run Agent 2 — Voice
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -f "agents/agent2_voice.py" ]; then
            python agents/agent2_voice.py
          else
            python agent2_voice.py
          fi

      # Agent 3 (Video) runs separately — needs more resources
      # Uncomment below once script+voice pipeline is stable
      # - name: Run Agent 3 — Video
      #   run: python agent3_video.py

      - name: Commit results
        run: |
          git config --global user.name "ContentPilot Bot"
          git config --global user.email "bot@contentpilot"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Daily run — $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
