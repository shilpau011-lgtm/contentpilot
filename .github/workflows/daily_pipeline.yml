name: ContentPilot — Daily Pipeline

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Agent 1 — Writer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f "agents/agent1_writer.py" ]; then
            python agents/agent1_writer.py
          else
            python agent1_writer.py
          fi

      - name: Run Agent 2 — Voice
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          if [ -f "agents/agent2_voice.py" ]; then
            python agents/agent2_voice.py
          else
            python agent2_voice.py
          fi

      - name: Save results
        run: |
          git config --global user.name "ContentPilot Bot"
          git config --global user.email "bot@contentpilot.local"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Daily run — $(date '+%Y-%m-%d %H:%M')"
          git push origin main
